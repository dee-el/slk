name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install X11 headers (cgo dep of golang.design/x/clipboard)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libx11-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Build
        run: go build -ldflags="-s -w" -trimpath ./...

      - name: Test
        run: go test ./... -race

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install X11 headers (cgo dep of golang.design/x/clipboard)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libx11-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
