# GoReleaser config for slk
# Docs: https://goreleaser.com
version: 2

project_name: slk

before:
  hooks:
    - go mod tidy

builds:
  - id: slk-static
    main: ./cmd/slk
    binary: slk
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # Windows on arm64 is rare and not worth the matrix slot for a TUI
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

  # golang.design/x/clipboard requires CGO on macOS. Build both Darwin
  # architectures on the native Intel macOS release runner so released
  # binaries retain image/text clipboard support.
  - id: slk-darwin
    main: ./cmd/slk
    binary: slk
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    overrides:
      - goos: darwin
        goarch: amd64
        env:
          - CGO_ENABLED=1
          - CC=clang-darwin-amd64
      - goos: darwin
        goarch: arm64
        env:
          - CGO_ENABLED=1
          - CC=clang-darwin-arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: slk
    ids:
      - slk-static
      - slk-darwin
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: Bug fixes
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: Performance
      regexp: "^.*perf[(\\w)]*:+.*$"
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

nfpms:
  - id: slk
    ids:
      - slk-static
    package_name: slk
    vendor: Grant Ammons
    homepage: https://github.com/gammons/slk
    maintainer: Grant Ammons <grant@grant.dev>
    description: |-
      A blazingly fast Slack TUI.
      Keyboard-driven, beautifully themed terminal client for Slack.
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
    section: net
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/slk/LICENSE
      - src: ./README.md
        dst: /usr/share/doc/slk/README.md

release:
  github:
    owner: gammons
    name: slk
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## slk {{ .Tag }}

    A blazingly fast Slack TUI. Keyboard-driven, beautifully themed, under 20MB.
  footer: |
    ---
    **Install**

    - **Linux/macOS:** download the appropriate `.tar.gz`, extract, and place `slk` in your `$PATH`
    - **Debian/Ubuntu:** `sudo dpkg -i slk_*.deb`
    - **Fedora/RHEL:** `sudo rpm -i slk_*.rpm`
    - **Alpine:** `sudo apk add --allow-untrusted slk_*.apk`
    - **Windows:** download the `.zip`, extract `slk.exe`, add to `PATH`
    - **Go:** `go install github.com/gammons/slk/cmd/slk@{{ .Tag }}`

    Verify downloads with `checksums.txt`.

# Homebrew tap.
#
# Publishes a formula to gammons/homebrew-tap on every non-prerelease
# tag. Users install via:
#
#     brew install gammons/tap/slk
#
# The token is a fine-grained PAT scoped to the homebrew-tap repo with
# contents:write, stored as HOMEBREW_TAP_GITHUB_TOKEN in this repo's
# Actions secrets.
brews:
  - name: slk
    repository:
      owner: gammons
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    commit_author:
      name: goreleaser
      email: goreleaser@gammons.dev
    commit_msg_template: "slk: brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    homepage: https://github.com/gammons/slk
    description: A blazingly fast, keyboard-driven Slack TUI
    license: MIT
    # Skip the prerelease tags goreleaser auto-flags so the tap only
    # tracks stable releases.
    skip_upload: auto
    install: |
      bin.install "slk"
    test: |
      assert_match "slk", shell_output("#{bin}/slk --version")
    caveats: |
      First run: `slk login` to authenticate with your Slack workspace.
      Config lives in ~/.config/slk/.

